name: Publish NuGet Package
on:
  push:
    branches: [ master ]
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Pack
        run: dotnet pack InterReact/InterReact.csproj -c Release -o ./nupkg
      - name: Push to GitHub Packages
        run: dotnet nuget push "./nupkg/*.nupkg" --api-key ${{ secrets.GH_PACKAGES_TOKEN }} --source "https://nuget.pkg.github.com/pablocar80/index.json"
